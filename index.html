<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Entry Form</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="icon" type="image/x-icon" href="/images/icon.ico">
</head>

<body>
    <div class="form-wrapper">
        <div class="form-header">
            <h2>Payment Entry Portal</h2>
        </div>

        <form id="paymentForm">
            <div class="section-title">Student Information</div>
            <div class="input-grid">
                <div class="input-group">
                    <label>Student Name *</label>
                    <input type="text" id="studentName" required>
                </div>
                <div class="input-group">
                    <label>Student ID</label>
                    <input type="text" id="studentId">
                </div>
            </div>

            <div class="input-group">
                <label>Course / Batch *</label>
                <input type="text" id="batch" placeholder="PET/001/MON" required>
            </div>

            <div class="input-grid">
                <div class="input-group">
                    <label>Payment Date</label>
                    <input type="date" id="paymentDate">
                </div>
                <div class="input-group">
                    <label>Payment Type</label>
                    <select id="paymentType">
                        <option value="Card">Card</option>
                        <option value="Cash">Cash</option>
                        <option value="Bank Transfer">Bank Transfer</option>
                    </select>
                </div>
            </div>

            <div class="section-title">Payment Details</div>
            <div id="paymentRows">
                <div class="payment-row">
                    <input type="text" class="month" placeholder="Month" required>
                    <select class="installment"></select>
                    <input type="number" class="amount" placeholder="Amount" step="0.01" required>
                </div>
            </div>
            <!-- <button type="button" class="btn-secondary" onclick="addRow()" style="margin-top:10px;">+ Click to add more
                months if needed</button> -->

            <div class="input-group" style="margin-top: 20px; max-width: 200px;">
                <label>Penalty Amount</label>
                <input type="number" id="penalty" value="0.00" step="0.01">
            </div>

            <div class="form-footer">
                <button type="submit" class="btn-primary">Generate Receipt</button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
